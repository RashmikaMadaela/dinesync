services:
  # 1. Primary Database (Postgres + Vector Extension)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dinesync_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: ${DB_NAME:-dinesync}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dinesync-network
    restart: always

  # 2. Caching & Real-time (Redis)
  redis:
    image: redis:alpine
    container_name: dinesync_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dinesync-network
    restart: always

  # 3. Database GUI (PgAdmin) - Optional but recommended for Dev
  pgadmin:
    image: dpage/pgadmin4
    container_name: dinesync_pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dinesync.com
      PGADMIN_DEFAULT_PASSWORD: root
    networks:
      - dinesync-network
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:

networks:
  dinesync-network:
    driver: bridge